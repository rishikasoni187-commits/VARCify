    id: 0, source: "Aeon Magazine",
    title: "The world is not a problem to be solved",
    meta: "Aeon Essays · Philosophy · ~5 min read", skill: "Tone & Inference",
    body: `<p>We live in an age that worships solutions. The default assumption of modernity is that every problem — poverty, disease, war, boredom — is, at root, a technical puzzle awaiting the right method. This faith is not entirely unreasonable. Science and engineering have genuinely solved things that once seemed intractable. Smallpox is gone. Famine has retreated. Infant mortality has collapsed.</p>
<p>But something troubling happens when solution-thinking becomes the only mode of engagement with the world. Problems require clear definitions. They require a stable relationship between cause and effect. They require, crucially, an agreement on what a good outcome would look like. Most of the things that actually matter in human life — how to raise a child, how to grieve, how to build a just society — satisfy none of these conditions.</p>
<p>The philosopher Ivan Illich was fond of distinguishing between problems and mysteries. A problem is something that stands before you, external, solvable in principle if you deploy sufficient intelligence and resources. A mystery is something you are inside of. It doesn't yield to technique, because technique is itself part of what must be questioned. Education, for Illich, was a mystery that the modern era had catastrophically tried to treat as a problem.</p>
<p>The danger of solution-thinking is not that it fails. Sometimes it succeeds spectacularly. The danger is that it reshapes our perception, so that we begin to see only the things that can be solved — and quietly stop noticing, or caring about, everything else. The unquantifiable, the irreducible, the sacred — these tend to become invisible to minds trained on solvability.</p>`,

    id: 1, source: "The Economist",
    title: "Why sleep deprivation is a 21st-century epidemic",
    meta: "The Economist · Science & Technology · ~5 min read", skill: "Comprehension & Main Idea",
    body: `<p>For most of human history, sleep was non-negotiable. Darkness came, temperatures fell, and the body obeyed signals older than consciousness. The invention of artificial light changed everything — and not only by keeping people awake longer. It changed the cultural meaning of sleep. Gradually, across the 20th century, sleeping became associated with laziness, wasted time, a failure of ambition. Margaret Thatcher famously claimed to sleep four hours a night and implied this was a virtue.</p>
<p>The consequences of this cultural shift are now visible in public health data. Researchers estimate that adults in industrialised countries sleep, on average, 90 minutes less per night than they did a century ago. The effects compound across a lifetime. Chronic sleep deprivation is associated with increased risk of obesity, Type 2 diabetes, cardiovascular disease, and depression. Some studies suggest it accelerates cognitive decline. The immune system is measurably impaired after even a single night of poor sleep.</p>
<p>What makes this particularly difficult to address is that sleep deprivation impairs your ability to notice that you are sleep-deprived. People who get six hours a night consistently believe they are functioning normally. Their objective performance, measured on reaction-time and memory tests, tells a different story. This is sometimes called the sleepiness paradox: the worse your sleep, the less equipped you are to recognise it.</p>
<p>The economic framing may be the most persuasive lever available to policymakers. RAND Corporation has estimated that sleep deprivation costs the United States economy over $400 billion a year in lost productivity. Companies in Japan and Germany have begun paying employees bonuses for logging sufficient sleep. Whether financial incentives can reverse a century of cultural messaging remains to be seen.</p>`,

    id: 2, source: "Aeon Magazine",
    title: "The myth of multitasking and the focused mind",
    meta: "Aeon Essays · Psychology · ~5 min read", skill: "Inference & Author Intent",
    body: `<p>The human brain is a serial processor, not a parallel one. This is not a metaphor or an approximation; it is a description of neural architecture. When we believe we are doing two things at once, we are actually switching rapidly between them, with each switch incurring a small but real cost — in time, in accuracy, and in something harder to measure: the quality of attention itself.</p>
<p>The mythology of multitasking arose from a specific cultural moment. In the 1990s, as computing power expanded and communication accelerated, speed became the dominant metaphor for competence. Doing more things simultaneously felt, intuitively, like doing more. The feeling was wrong, but the intuition proved stubbornly durable. Decades of cognitive science research have now established, beyond reasonable dispute, that multitasking degrades performance across virtually every domain that requires genuine thought.</p>
<p>What is less often discussed is the cumulative effect on how people relate to their own attention. Chronic multitasking appears to alter the brain's baseline state. Studies by Clifford Nass at Stanford found that heavy multitaskers performed worse on tests of attention, memory, and the ability to filter irrelevant information — even when they were not multitasking at the time of the test. The habit of fragmented attention, it seems, persists even in its absence.</p>
<p>The deepest cost may be to what the philosopher William James called "the faculty of voluntarily bringing back a wandering attention." James considered this the very root of character, will, and practical reason. If he was right, then the question of whether we can focus is not merely a productivity question. It is a question about what kind of selves we are capable of becoming.</p>`,

    title: "India's urbanisation crisis is also a planning failure",
    meta: "The Hindu · Policy & Governance · ~5 min read", skill: "Critical Reasoning",
    body: `<p>India is urbanising at a speed and scale that has no precedent. By 2050, an estimated 800 million people will live in Indian cities — more than twice the current urban population. The infrastructure consequences of this shift are frequently discussed. What is less often examined is the governance vacuum that makes those consequences so much worse than they need to be.</p>
<p>Indian cities are governed by a tangle of overlapping authorities. A typical metropolitan area might be subject to a municipal corporation, a development authority, a state government, several parastatals, and, in some cases, a cantonment board — each with different mandates, different budgets, and different political masters. The result is not coordination but competition: agencies that guard their jurisdictions, duplicate efforts, and shift blame rather than share accountability.</p>
<p>This is not an accident of history. It is the consequence of a deliberate political choice. The 74th Constitutional Amendment, passed in 1992, was intended to transfer power to elected urban local bodies. Three decades later, the promise remains largely unfulfilled. State governments, reluctant to cede control over the revenue and patronage that cities generate, have systematically undermined the Amendment's intent by withholding funds, delaying elections, and creating parallel bodies that bypass elected councils entirely.</p>
<p>The technocratic impulse — to solve urban India's problems with master plans, smart city schemes, and international consultants — is understandable but insufficient. Better planning tools are valuable only when there are institutions capable of implementing and enforcing them. Without genuine decentralisation of power and resources to cities, India risks building ever more elaborate planning documents for problems that governance reform alone could begin to address.</p>`,

    meta: "Aeon Essays · Culture · ~5 min read", skill: "Tone & Comprehension",
    body: `<p>Somewhere in the past century, rest became something you had to justify. The contemporary vocabulary of leisure is revealing: we speak of "recharging" (as if we were batteries), "unwinding" (as if tension were the default state), "taking a break" (as if stillness were an interruption of the real work). These metaphors encode a belief: that productivity is the ground state of a human life, and everything else is recuperation in its service.</p>
<p>This belief is historically unusual. The ancient Greeks — from whom we inherit much of our intellectual framework — did not share it. For Aristotle, leisure (scholē) was not the opposite of work but its purpose. Work was what you did so that you could have leisure. Leisure, in turn, was not idleness but the condition of freedom in which genuine thinking, friendship, and participation in public life became possible.</p>
<p>The modern reversal — where leisure exists to restore our capacity for work — has had consequences that extend beyond exhaustion. It has colonised our imagination. We now find it difficult to value activities that are not in some way productive, developmental, or optimising. Reading fiction is valuable because it builds empathy (useful). Walking is valuable because it is good for cardiovascular health (useful). Even meditation, that refuge of the non-instrumental, is now often justified by its effects on workplace performance.</p>
<p>What has been lost is the capacity to value experience as intrinsically worthwhile — not for what it produces, but for what it is. The ancient concept of contemplation, theoria, was not a means to anything. It was considered, by those who practised it, to be the highest form of human activity precisely because it was useless. We have largely forgotten how to think like this, and the forgetting may be costing us more than we realise.</p>`,
    questions: [
      { q: "What is the central argument of this passage — in one sentence?", hint: "Ancient vs modern views — but what is the actual point being made?" },
      { q: "What is the author's tone, and which specific word or phrase tells you this?", hint: "'The forgetting may be costing us more than we realise' — what does this reveal?" },
      { q: "The author's reference to Aristotle (para 2) primarily serves to — explain its argumentative purpose.", hint: "Why bring in ancient history? What does it do for the argument?" }
    ]
  }
];
 
let state = {
  current: 0, done: [], streak: 0,
  answers: {}, feedback: {}, phase: 'read',
  doubts: {},
  doubtOpen: false,
  selectedText: '',
  doubtLoading: false
};
 
try {
  const s = JSON.parse(localStorage.getItem('varcify2_state') || '{}');
  if (s.done) state.done = s.done;
  if (s.streak) state.streak = s.streak;
  if (s.doubts) state.doubts = s.doubts;
} catch(e) {}
 
function save() {
  try { localStorage.setItem('varcify2_state', JSON.stringify({ done: state.done, streak: state.streak, doubts: state.doubts })); } catch(e) {}
}
 
function updateStreak() {
  document.getElementById('streak-label').textContent = state.streak + ' day streak';
}
 
function renderNav() {
  document.getElementById('article-nav').innerHTML = ARTICLES.map((a,i) => {
    const isDone = state.done.includes(i), isActive = i === state.current;
    return `<div class="art-pill ${isActive?'active':isDone?'done':''}" onclick="switchArticle(${i})">${isDone?'✓ ':''}Day ${i+1}</div>`;
  }).join('');
}
 
function switchArticle(i) {
  state.current = i;
  state.phase = state.done.includes(i) ? 'done' : 'read';
  state.answers = {};
  state.doubtOpen = false;
  state.selectedText = '';
  render();
}
 
function getDoubtHistory() {
  return state.doubts[state.current] || [];
}
 
function render() {
  renderNav(); updateStreak();
  const art = ARTICLES[state.current];
  const main = document.getElementById('main-content');
  const isDone = state.done.includes(state.current);
  const doubtHistory = getDoubtHistory();
 
  let html = `<div class="stats-row">
    <div class="stat-card"><div class="stat-val">${state.done.length}</div><div class="stat-lbl">articles done</div></div>
    <div class="stat-card"><div class="stat-val">${state.streak}</div><div class="stat-lbl">day streak</div></div>
    <div class="stat-card"><div class="stat-val">${Object.values(state.doubts).flat().length}</div><div class="stat-lbl">doubts solved</div></div>
  </div>`;
 
  html += `<div class="article-card">
    <div class="article-header">
      <div class="article-source">${art.source} &nbsp;·&nbsp; ${art.skill}</div>
      <div class="article-title">${art.title}</div>
      <div class="article-meta">${art.meta}</div>
    </div>
    <div class="article-body" id="article-body-text">${art.body}</div>
    <div class="doubt-hint">
      <svg viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="#633806" stroke-width="1"/><path d="M7 6v4M7 4.5v.5" stroke="#633806" stroke-width="1.2" stroke-linecap="round"/></svg>
      <span>Select any text in the article to ask a doubt about it, or click below to open the doubt solver.</span>
    </div>
  </div>`;
 
  if (state.doubtOpen || doubtHistory.length > 0) {
    html += `<div class="doubt-panel">
      <div class="doubt-panel-header">
        <div class="doubt-panel-title">Doubt solver — ask anything about this article</div>
        <button class="doubt-close" onclick="toggleDoubt()">×</button>
      </div>`;
 
    if (state.selectedText) {
      html += `<div class="doubt-selected-text">"${state.selectedText.substring(0,120)}${state.selectedText.length>120?'...':''}"</div>`;
    }
 
    html += `<div class="quick-doubts">
      <div class="quick-btn" onclick="askQuick('What is the author\\'s main argument?')">What is the main argument?</div>
      <div class="quick-btn" onclick="askQuick('What is the tone of this passage?')">Explain the tone</div>
      <div class="quick-btn" onclick="askQuick('What does the last paragraph mean?')">Explain last paragraph</div>
      <div class="quick-btn" onclick="askQuick('Give me a CAT-style inference question on this passage.')">Give me an inference question</div>
    </div>`;
 
    if (doubtHistory.length > 0) {
      html += `<div class="doubt-history">`;
      doubtHistory.forEach((ex, i) => {
        if (i > 0) html += `<hr class="doubt-divider">`;
        html += `<div class="doubt-exchange">
          <div class="doubt-q">You asked: ${ex.q}</div>
          <div class="doubt-a">${ex.a}</div>
        </div>`;
      });
      if (state.doubtLoading) {
        html += `<hr class="doubt-divider"><div class="doubt-a-loading"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span style="margin-left:4px">thinking...</span></div>`;
      }
      html += `</div>`;
    } else if (state.doubtLoading) {
      html += `<div class="doubt-history"><div class="doubt-a-loading"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span style="margin-left:4px">thinking...</span></div></div>`;
    }
 
    html += `<div class="doubt-input-row">
      <input class="doubt-input" id="doubt-input" type="text" placeholder="Ask anything about this article..." onkeydown="if(event.key==='Enter')submitDoubt()" />
      <button class="doubt-ask-btn" id="doubt-ask-btn" onclick="submitDoubt()" ${state.doubtLoading?'disabled':''}>Ask</button>
    </div></div>`;
  } else {
    html += `<button class="open-doubt-btn" onclick="toggleDoubt()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="#0F6E56" stroke-width="1"/><path d="M5.5 5.5C5.5 4.67 6.17 4 7 4s1.5.67 1.5 1.5c0 .67-.4 1.23-1 1.45V8" stroke="#0F6E56" stroke-width="1.1" stroke-linecap="round"/><circle cx="7" cy="10" r=".6" fill="#0F6E56"/></svg>
      Open doubt solver
    </button>`;
  }
 
  if (isDone && state.feedback[state.current]) {
    html += `<div class="section-divider"><div class="section-divider-line"></div><div class="section-divider-text">your feedback</div><div class="section-divider-line"></div></div>`;
    html += renderFeedback(state.feedback[state.current]);
    html += `<button class="next-btn" onclick="nextArticle()">Next article &rarr;</button>`;
  } else if (state.phase === 'feedback-loading') {
    html += `<div class="questions-card"><div class="loading-state">
      <div style="margin-bottom:12px;font-weight:500;color:#1D9E75;font-size:15px;">Analysing your responses...</div>
      <div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    </div></div>`;
  } else {
    html += `<div class="section-divider"><div class="section-divider-line"></div><div class="section-divider-text">now answer these</div><div class="section-divider-line"></div></div>`;
    html += `<div class="questions-card"><div class="q-label">Three questions — answer all</div>`;
    art.questions.forEach((q, qi) => {
      html += `<div class="question-block">
        <div class="q-num">Question ${qi+1} of 3 &nbsp;·&nbsp; ${art.skill}</div>
        <div class="q-text">${q.q}</div>
        <div class="q-hint">${q.hint}</div>
        <textarea id="ans-${qi}" placeholder="Type your answer here..." rows="3"></textarea>
      </div>`;
    });
    html += `<p class="error-text" id="submit-error">Please answer all three questions before submitting.</p>
      <button class="submit-btn" onclick="submitAnswers()">Get AI feedback</button></div>`;
  }
 
  main.innerHTML = html;
 
  if (state.phase === 'feedback-loading') callClaudeForFeedback(art);
 
  setupSelectionListener();
}
 
function toggleDoubt() {
  state.doubtOpen = !state.doubtOpen;
  state.selectedText = '';
  render();
  if (state.doubtOpen) {
    setTimeout(() => { const el = document.getElementById('doubt-input'); if(el) el.focus(); }, 100);
  }
}
 
function openDoubtFromSelection() {
  state.doubtOpen = true;
  render();
  setTimeout(() => { const el = document.getElementById('doubt-input'); if(el) { el.focus(); el.placeholder = 'Ask about the selected text...'; } }, 100);
  hideTooltip();
}
 
function askQuick(q) {
  state.doubtOpen = true;
  submitDoubtText(q);
}
 
function submitDoubt() {
  const input = document.getElementById('doubt-input');
  if (!input || !input.value.trim()) return;
  submitDoubtText(input.value.trim());
  input.value = '';
}
 
async function submitDoubtText(question) {
  const art = ARTICLES[state.current];
  if (!state.doubts[state.current]) state.doubts[state.current] = [];
  state.doubtLoading = true;
  render();
 
  const contextNote = state.selectedText ? `The student selected this specific text: "${state.selectedText}". ` : '';
  const prompt = `You are a CAT VARC expert helping a student understand a passage.
 
Article: "${art.title}" (${art.source})
 
Full passage:
${art.body.replace(/<[^>]+>/g,'').trim()}
 
${contextNote}Student's question: "${question}"
 
Answer in 3-5 sentences. Be specific and reference the passage directly. Focus on:
- What the passage actually says
- How it applies to CAT VARC reasoning
- One concrete technique or insight the student can use
 
Be clear, direct, and helpful. No fluff.`;
 
  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 400,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await response.json();
    const answer = (data.content||[]).map(b=>b.text||'').join('').trim();
    state.doubts[state.current].push({ q: question, a: answer });
  } catch(e) {
    state.doubts[state.current].push({ q: question, a: "The passage is making an argument about how we think — focus on what the author is trying to convince you of, not just what they describe. In CAT VARC, every question ties back to the author's central intent." });
  }
 
  state.doubtLoading = false;
  state.selectedText = '';
  save();
  render();
}
 
function setupSelectionListener() {
  const body = document.getElementById('article-body-text');
  if (!body) return;
  body.addEventListener('mouseup', handleSelection);
  body.addEventListener('touchend', handleSelection);
}
 
function handleSelection() {
  setTimeout(() => {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed || !sel.toString().trim()) { hideTooltip(); return; }
    const text = sel.toString().trim();
    if (text.length < 10) { hideTooltip(); return; }
    state.selectedText = text;
    const range = sel.getRangeAt(0);
    const rect = range.getBoundingClientRect();
    const tooltip = document.getElementById('sel-tooltip');
    tooltip.style.display = 'block';
    tooltip.style.top = (window.scrollY + rect.top - 38) + 'px';
    tooltip.style.left = (rect.left + rect.width / 2) + 'px';
  }, 10);
}
 
function hideTooltip() {
  const t = document.getElementById('sel-tooltip');
  if (t) t.style.display = 'none';
}
 
document.addEventListener('mousedown', (e) => {
  if (!e.target.closest('#article-body-text') && !e.target.closest('#sel-tooltip')) hideTooltip();
});
 
function submitAnswers() {
  const art = ARTICLES[state.current];
  const answers = art.questions.map((_, qi) => { const el = document.getElementById(`ans-${qi}`); return el ? el.value.trim() : ''; });
  const err = document.getElementById('submit-error');
  if (answers.some(a => a.length < 5)) { err.style.display='block'; return; }
  err.style.display = 'none';
  state.answers[state.current] = answers;
  state.phase = 'feedback-loading';
  render();
}
 
async function callClaudeForFeedback(art) {
  const answers = state.answers[state.current] || [];
  const doubtCount = (state.doubts[state.current]||[]).length;
  const prompt = `You are a CAT VARC expert evaluating a student's reading comprehension responses.
 
Article: "${art.title}" (${art.source}). Skill tested: ${art.skill}.
The student asked ${doubtCount} doubt(s) while reading — factor this into your feedback positively.
 
Q1: ${art.questions[0].q}
Answer: "${answers[0]||'(blank)'}"
 
Q2: ${art.questions[1].q}
Answer: "${answers[1]||'(blank)'}"
 
Q3: ${art.questions[2].q}
Answer: "${answers[2]||'(blank)'}"
 
Respond ONLY with JSON, no markdown:
{
  "scores": { "comprehension": <0-100>, "tone": <0-100>, "inference": <0-100> },
  "strengths": "<2 sentences referencing their actual answers>",
  "gaps": "<2 sentences: specifically where reasoning broke down>",
  "tip": "<1 concrete reading technique for tomorrow>"
}`;
 
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 600, messages: [{ role: "user", content: prompt }] })
    });
    const data = await res.json();
    const text = (data.content||[]).map(b=>b.text||'').join('');
    state.feedback[state.current] = JSON.parse(text.replace(/```json|```/g,'').trim());
  } catch(e) {
    state.feedback[state.current] = {
      scores: { comprehension: 68, tone: 72, inference: 65 },
      strengths: "You engaged with the passage and showed genuine effort in your answers.",
      gaps: "Try anchoring your tone answer to a specific word or phrase from the text. For inference, use the passage logic rather than general knowledge.",
      tip: "Before answering, ask: what is the author trying to persuade me of? Every answer flows from that."
    };
  }
 
  if (!state.done.includes(state.current)) { state.done.push(state.current); state.streak += 1; }
  state.phase = 'done'; save(); render();
}
 
function renderFeedback(fb) {
  const s = fb.scores || { comprehension:70, tone:65, inference:72 };
  const overall = Math.round((s.comprehension+s.tone+s.inference)/3);
  return `<div class="feedback-card">
    <div class="feedback-header"><div class="feedback-title">Your VARC feedback</div><div class="score-badge">Overall: ${overall}%</div></div>
    <div class="feedback-body">
      <div class="fb-section"><div class="fb-section-title">Skill scores</div>
        <div class="skill-bar-row"><div class="skill-name">Comprehension</div><div class="skill-bar-bg"><div class="skill-bar-fill" style="width:${s.comprehension}%"></div></div><div class="skill-pct">${s.comprehension}%</div></div>
        <div class="skill-bar-row"><div class="skill-name">Tone-spotting</div><div class="skill-bar-bg"><div class="skill-bar-fill" style="width:${s.tone}%"></div></div><div class="skill-pct">${s.tone}%</div></div>
        <div class="skill-bar-row"><div class="skill-name">Inference</div><div class="skill-bar-bg"><div class="skill-bar-fill" style="width:${s.inference}%"></div></div><div class="skill-pct">${s.inference}%</div></div>
      </div>
      <div class="fb-section"><div class="fb-section-title">What you got right</div><div class="fb-text">${fb.strengths}</div></div>
      <div class="fb-section"><div class="fb-section-title">Where your reading broke down</div><div class="fb-text">${fb.gaps}</div></div>
      <div class="fb-section"><div class="fb-section-title">Technique for tomorrow</div><div class="fb-text">${fb.tip}</div></div>
    </div>
  </div>`;
}
 
function nextArticle() {
  const next = ARTICLES.findIndex((_,i) => !state.done.includes(i));
  if (next !== -1) { state.current=next; state.phase='read'; state.answers={}; state.doubtOpen=false; render(); }
  else {
    renderNav();
    document.getElementById('main-content').innerHTML = `<div class="complete-card">
      <div class="complete-icon"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M4 11l5 5 9-9" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="complete-title">All 5 articles complete!</div>
      <div class="complete-sub">You solved ${Object.values(state.doubts).flat().length} doubts and built ${state.streak} days of reading habit. Come back tomorrow for new articles.</div>
    </div>`;
  }
}
 
render();
</script>
</body>
</html>
