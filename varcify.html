<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VARCify — by Optima Learn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ol-green: #1D9E75;
      --ol-green-light: #E1F5EE;
      --ol-green-dark: #0F6E56;
      --ol-green-deeper: #085041;
      --ol-text: #1a1a1a;
      --ol-muted: #5F5E5A;
      --ol-border: rgba(0,0,0,0.1);
      --ol-bg: #ffffff;
      --ol-surface: #F7FAF9;
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--ol-surface);
      color: var(--ol-text);
      min-height: 100vh;
    }

    .app { max-width: 780px; margin: 0 auto; padding-bottom: 3rem; }

    /* ── Topbar ── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px;
      background: var(--ol-bg);
      border-bottom: 0.5px solid var(--ol-border);
      position: sticky; top: 0; z-index: 10;
    }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-icon {
      width: 28px; height: 28px; border-radius: 6px;
      background: var(--ol-green);
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 16px; height: 16px; }
    .logo-name { font-size: 14px; font-weight: 500; color: var(--ol-text); }
    .logo-name span { color: var(--ol-green); }
    .logo-badge {
      font-size: 10px; background: var(--ol-green-light); color: var(--ol-green-dark);
      padding: 2px 7px; border-radius: 99px; font-weight: 500; margin-left: 4px;
    }
    .streak-pill {
      display: flex; align-items: center; gap: 6px;
      background: var(--ol-green-light); border-radius: 99px;
      padding: 5px 12px; font-size: 13px; color: var(--ol-green-dark); font-weight: 500;
    }
    .streak-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ol-green); }

    /* ── Hero ── */
    .hero {
      background: var(--ol-bg);
      border-bottom: 0.5px solid var(--ol-border);
      padding: 20px 24px 18px;
    }
    .hero-label {
      font-size: 11px; color: var(--ol-green); font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px;
    }
    .hero-title { font-family: 'DM Serif Display', serif; font-size: 22px; margin-bottom: 4px; }
    .hero-sub { font-size: 13px; color: var(--ol-muted); line-height: 1.5; }

    /* ── Article Nav ── */
    .article-nav {
      display: flex; gap: 8px; padding: 14px 20px;
      background: var(--ol-bg); border-bottom: 0.5px solid var(--ol-border);
      overflow-x: auto;
    }
    .art-pill {
      flex-shrink: 0; font-size: 12px; padding: 5px 12px;
      border-radius: 99px; border: 0.5px solid var(--ol-border);
      background: var(--ol-surface); color: var(--ol-muted);
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .art-pill.active { background: var(--ol-green); color: #fff; border-color: var(--ol-green); }
    .art-pill.done { background: var(--ol-green-light); color: var(--ol-green-dark); border-color: transparent; }

    /* ── Main ── */
    .main { padding: 20px; }

    /* ── Stats ── */
    .stats-row { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; margin-bottom: 16px; }
    .stat-card {
      background: var(--ol-bg); border: 0.5px solid var(--ol-border);
      border-radius: var(--radius-sm); padding: 12px 14px;
    }
    .stat-val { font-size: 22px; font-weight: 500; color: var(--ol-green); }
    .stat-lbl { font-size: 11px; color: var(--ol-muted); margin-top: 2px; }

    /* ── Article Card ── */
    .article-card {
      background: var(--ol-bg); border-radius: var(--radius);
      border: 0.5px solid var(--ol-border); margin-bottom: 16px; overflow: hidden;
    }
    .article-header { padding: 16px 18px 12px; border-bottom: 0.5px solid var(--ol-border); }
    .article-source {
      font-size: 11px; color: var(--ol-green); font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px;
    }
    .article-title {
      font-family: 'DM Serif Display', serif; font-size: 18px;
      line-height: 1.35; margin-bottom: 4px;
    }
    .article-meta { font-size: 12px; color: var(--ol-muted); }
    .article-body {
      padding: 16px 18px; font-size: 14px; line-height: 1.8;
      font-family: 'DM Serif Display', serif;
    }
    .article-body p { margin-bottom: 14px; }
    .article-body p:last-child { margin-bottom: 0; }

    /* ── Questions ── */
    .questions-card {
      background: var(--ol-bg); border-radius: var(--radius);
      border: 0.5px solid var(--ol-border); padding: 18px; margin-bottom: 16px;
    }
    .q-label {
      font-size: 11px; color: var(--ol-green); font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 14px;
    }
    .question-block { margin-bottom: 18px; }
    .question-block:last-of-type { margin-bottom: 14px; }
    .q-num { font-size: 11px; color: var(--ol-muted); margin-bottom: 4px; }
    .q-text { font-size: 14px; font-weight: 500; line-height: 1.4; margin-bottom: 5px; }
    .q-hint { font-size: 12px; color: var(--ol-muted); margin-bottom: 7px; font-style: italic; }
    textarea {
      width: 100%; border: 0.5px solid var(--ol-border); border-radius: var(--radius-sm);
      padding: 10px 12px; font-size: 13px; font-family: 'DM Sans', sans-serif;
      color: var(--ol-text); background: var(--ol-surface); resize: vertical;
      min-height: 76px; outline: none; transition: border-color 0.15s; line-height: 1.6;
    }
    textarea:focus { border-color: var(--ol-green); }

    .submit-btn {
      width: 100%; padding: 13px; background: var(--ol-green); color: #fff;
      border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500;
      cursor: pointer; transition: background 0.15s; font-family: 'DM Sans', sans-serif;
    }
    .submit-btn:hover { background: var(--ol-green-dark); }
    .submit-btn:disabled { background: #9FE1CB; cursor: not-allowed; }
    .error-text { font-size: 12px; color: #A32D2D; margin-top: 8px; display: none; }

    /* ── Loading ── */
    .loading-state { text-align: center; padding: 28px; color: var(--ol-muted); font-size: 14px; }
    .loading-dot {
      display: inline-block; width: 7px; height: 7px; border-radius: 50%;
      background: var(--ol-green); animation: pulse 1s infinite; margin: 0 2px;
    }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

    /* ── Feedback ── */
    .feedback-card {
      background: var(--ol-bg); border-radius: var(--radius);
      border: 0.5px solid var(--ol-border); overflow: hidden; margin-bottom: 16px;
    }
    .feedback-header {
      padding: 14px 18px; background: var(--ol-green-light);
      border-bottom: 0.5px solid rgba(29,158,117,0.2);
      display: flex; align-items: center; justify-content: space-between;
    }
    .feedback-title { font-size: 14px; font-weight: 500; color: var(--ol-green-dark); }
    .score-badge {
      font-size: 13px; font-weight: 500; background: var(--ol-green);
      color: #fff; padding: 3px 11px; border-radius: 99px;
    }
    .feedback-body { padding: 16px 18px; }
    .fb-section { margin-bottom: 16px; }
    .fb-section:last-child { margin-bottom: 0; }
    .fb-section-title {
      font-size: 11px; color: var(--ol-green); font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px;
    }
    .fb-text { font-size: 13px; line-height: 1.65; }
    .skill-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 7px; }
    .skill-name { font-size: 12px; color: var(--ol-muted); width: 110px; flex-shrink: 0; }
    .skill-bar-bg { flex: 1; height: 6px; background: var(--ol-green-light); border-radius: 99px; overflow: hidden; }
    .skill-bar-fill { height: 100%; background: var(--ol-green); border-radius: 99px; transition: width 0.9s ease; }
    .skill-pct { font-size: 12px; color: var(--ol-green-dark); font-weight: 500; width: 34px; text-align: right; }

    /* ── Buttons ── */
    .next-btn {
      width: 100%; padding: 13px; background: var(--ol-surface); color: var(--ol-green-dark);
      border: 0.5px solid var(--ol-green); border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif;
      transition: background 0.15s; margin-bottom: 16px;
    }
    .next-btn:hover { background: var(--ol-green-light); }

    /* ── Complete ── */
    .complete-card {
      background: var(--ol-green-light); border-radius: var(--radius);
      border: 0.5px solid rgba(29,158,117,0.3); padding: 32px 24px; text-align: center; margin-bottom: 16px;
    }
    .complete-icon {
      width: 44px; height: 44px; background: var(--ol-green); border-radius: 50%;
      margin: 0 auto 14px; display: flex; align-items: center; justify-content: center;
    }
    .complete-title { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--ol-green-deeper); margin-bottom: 8px; }
    .complete-sub { font-size: 13px; color: var(--ol-green-dark); line-height: 1.6; }

    /* ── API key notice ── */
    .api-notice {
      background: #FAEEDA; border: 0.5px solid rgba(186,117,23,0.3);
      border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 14px;
      font-size: 12px; color: #633806; line-height: 1.5;
    }
    .api-notice strong { font-weight: 500; }
  </style>
</head>
<body>

<div class="app">

  <div class="topbar">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 4h10M3 8h7M3 12h5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="logo-name">optima <span>learn</span></span>
      <span class="logo-badge">VARCify</span>
    </div>
    <div class="streak-pill">
      <div class="streak-dot"></div>
      <span id="streak-label">0 day streak</span>
    </div>
  </div>

  <div class="hero">
    <div class="hero-label">Daily VARC training</div>
    <div class="hero-title">Read. Reflect. Improve.</div>
    <div class="hero-sub">One real article a day. Three guided questions. The skill CAT actually tests.</div>
  </div>

  <div class="article-nav" id="article-nav"></div>

  <div class="main" id="main-content"></div>

</div>

<script>
const ARTICLES = [
  {
    id: 0,
    source: "Aeon Magazine",
    title: "The world is not a problem to be solved",
    meta: "Aeon Essays · Philosophy · ~5 min read",
    skill: "Tone & Inference",
    body: `<p>We live in an age that worships solutions. The default assumption of modernity is that every problem — poverty, disease, war, boredom — is, at root, a technical puzzle awaiting the right method. This faith is not entirely unreasonable. Science and engineering have genuinely solved things that once seemed intractable. Smallpox is gone. Famine has retreated. Infant mortality has collapsed.</p>
<p>But something troubling happens when solution-thinking becomes the only mode of engagement with the world. Problems require clear definitions. They require a stable relationship between cause and effect. They require, crucially, an agreement on what a good outcome would look like. Most of the things that actually matter in human life — how to raise a child, how to grieve, how to build a just society — satisfy none of these conditions.</p>
<p>The philosopher Ivan Illich was fond of distinguishing between problems and mysteries. A problem is something that stands before you, external, solvable in principle if you deploy sufficient intelligence and resources. A mystery is something you are inside of. It doesn't yield to technique, because technique is itself part of what must be questioned. Education, for Illich, was a mystery that the modern era had catastrophically tried to treat as a problem.</p>
<p>The danger of solution-thinking is not that it fails. Sometimes it succeeds spectacularly. The danger is that it reshapes our perception, so that we begin to see only the things that can be solved — and quietly stop noticing, or caring about, everything else. The unquantifiable, the irreducible, the sacred — these tend to become invisible to minds trained on solvability.</p>`,
    questions: [
      { q: "What is the central argument of this passage — in one sentence?", hint: "Don't describe the examples. Capture the author's main claim." },
      { q: "What is the author's tone, and which specific word or phrase tells you this?", hint: "Pick one word or phrase from the text as your evidence." },
      { q: "Which statement would the author most likely agree with? (A) Technology will eventually solve all human problems. (B) Some important human experiences resist solution-based thinking. (C) Ivan Illich was wrong to distinguish problems from mysteries. Explain your choice.", hint: "Use the passage's logic, not your personal opinion." }
    ]
  },
  {
    id: 1,
    source: "The Economist",
    title: "Why sleep deprivation is a 21st-century epidemic",
    meta: "The Economist · Science & Technology · ~5 min read",
    skill: "Comprehension & Main Idea",
    body: `<p>For most of human history, sleep was non-negotiable. Darkness came, temperatures fell, and the body obeyed signals older than consciousness. The invention of artificial light changed everything — and not only by keeping people awake longer. It changed the cultural meaning of sleep. Gradually, across the 20th century, sleeping became associated with laziness, wasted time, a failure of ambition. Margaret Thatcher famously claimed to sleep four hours a night and implied this was a virtue.</p>
<p>The consequences of this cultural shift are now visible in public health data. Researchers estimate that adults in industrialised countries sleep, on average, 90 minutes less per night than they did a century ago. The effects compound across a lifetime. Chronic sleep deprivation is associated with increased risk of obesity, Type 2 diabetes, cardiovascular disease, and depression. Some studies suggest it accelerates cognitive decline. The immune system is measurably impaired after even a single night of poor sleep.</p>
<p>What makes this particularly difficult to address is that sleep deprivation impairs your ability to notice that you are sleep-deprived. People who get six hours a night consistently believe they are functioning normally. Their objective performance, measured on reaction-time and memory tests, tells a different story. This is sometimes called the sleepiness paradox: the worse your sleep, the less equipped you are to recognise it.</p>
<p>The economic framing may be the most persuasive lever available to policymakers. RAND Corporation has estimated that sleep deprivation costs the United States economy over $400 billion a year in lost productivity. Companies in Japan and Germany have begun paying employees bonuses for logging sufficient sleep. Whether financial incentives can reverse a century of cultural messaging remains to be seen.</p>`,
    questions: [
      { q: "What is the central argument of this passage — in one sentence?", hint: "The author covers several ideas. What is the single unifying claim?" },
      { q: "What is the author's tone, and which specific word or phrase tells you this?", hint: "Is it alarmed, neutral, optimistic, cynical? Find the evidence." },
      { q: "The author mentions the 'sleepiness paradox' primarily to — explain its role in the argument.", hint: "Think about why this detail appears where it does — what function does it serve?" }
    ]
  },
  {
    id: 2,
    source: "Aeon Magazine",
    title: "The myth of multitasking and the focused mind",
    meta: "Aeon Essays · Psychology · ~5 min read",
    skill: "Inference & Author Intent",
    body: `<p>The human brain is a serial processor, not a parallel one. This is not a metaphor or an approximation; it is a description of neural architecture. When we believe we are doing two things at once, we are actually switching rapidly between them, with each switch incurring a small but real cost — in time, in accuracy, and in something harder to measure: the quality of attention itself.</p>
<p>The mythology of multitasking arose from a specific cultural moment. In the 1990s, as computing power expanded and communication accelerated, speed became the dominant metaphor for competence. Doing more things simultaneously felt, intuitively, like doing more. The feeling was wrong, but the intuition proved stubbornly durable. Decades of cognitive science research have now established, beyond reasonable dispute, that multitasking degrades performance across virtually every domain that requires genuine thought.</p>
<p>What is less often discussed is the cumulative effect on how people relate to their own attention. Chronic multitasking appears to alter the brain's baseline state. Studies by Clifford Nass at Stanford found that heavy multitaskers performed worse on tests of attention, memory, and the ability to filter irrelevant information — even when they were not multitasking at the time of the test. The habit of fragmented attention, it seems, persists even in its absence.</p>
<p>The deepest cost may be to what the philosopher William James called "the faculty of voluntarily bringing back a wandering attention." James considered this the very root of character, will, and practical reason. If he was right, then the question of whether we can focus is not merely a productivity question. It is a question about what kind of selves we are capable of becoming.</p>`,
    questions: [
      { q: "What is the central argument of this passage — in one sentence?", hint: "The author builds across four paragraphs — what is the final claim they are working toward?" },
      { q: "What is the author's tone, and which specific word or phrase tells you this?", hint: "Notice how the author handles the 'mythology' of multitasking — what does word choice reveal?" },
      { q: "What would the author most likely say about someone who claims to be 'a great multitasker'? Use evidence from the passage.", hint: "Don't give your opinion. Use the passage's logic." }
    ]
  },
  {
    id: 3,
    source: "The Hindu — Opinion",
    title: "India's urbanisation crisis is also a planning failure",
    meta: "The Hindu · Policy & Governance · ~5 min read",
    skill: "Critical Reasoning",
    body: `<p>India is urbanising at a speed and scale that has no precedent. By 2050, an estimated 800 million people will live in Indian cities — more than twice the current urban population. The infrastructure consequences of this shift are frequently discussed. What is less often examined is the governance vacuum that makes those consequences so much worse than they need to be.</p>
<p>Indian cities are governed by a tangle of overlapping authorities. A typical metropolitan area might be subject to a municipal corporation, a development authority, a state government, several parastatals, and, in some cases, a cantonment board — each with different mandates, different budgets, and different political masters. The result is not coordination but competition: agencies that guard their jurisdictions, duplicate efforts, and shift blame rather than share accountability.</p>
<p>This is not an accident of history. It is the consequence of a deliberate political choice. The 74th Constitutional Amendment, passed in 1992, was intended to transfer power to elected urban local bodies. Three decades later, the promise remains largely unfulfilled. State governments, reluctant to cede control over the revenue and patronage that cities generate, have systematically undermined the Amendment's intent by withholding funds, delaying elections, and creating parallel bodies that bypass elected councils entirely.</p>
<p>The technocratic impulse — to solve urban India's problems with master plans, smart city schemes, and international consultants — is understandable but insufficient. Better planning tools are valuable only when there are institutions capable of implementing and enforcing them. Without genuine decentralisation of power and resources to cities, India risks building ever more elaborate planning documents for problems that governance reform alone could begin to address.</p>`,
    questions: [
      { q: "What is the central argument of this passage — in one sentence?", hint: "The author mentions urbanisation, governance, and planning — which of these is the actual central claim?" },
      { q: "What is the author's tone, and which specific word or phrase tells you this?", hint: "Is the author hopeful, critical, resigned, analytical? Find one phrase that reveals this." },
      { q: "The author uses the phrase 'not an accident of history' (paragraph 3) primarily to — explain what argumentative work this phrase is doing.", hint: "Think about what claim the author is making with this line structurally." }
    ]
  },
  {
    id: 4,
    source: "Aeon Magazine",
    title: "Against productivity: the value of doing nothing",
    meta: "Aeon Essays · Culture · ~5 min read",
    skill: "Tone & Comprehension",
    body: `<p>Somewhere in the past century, rest became something you had to justify. The contemporary vocabulary of leisure is revealing: we speak of "recharging" (as if we were batteries), "unwinding" (as if tension were the default state), "taking a break" (as if stillness were an interruption of the real work). These metaphors encode a belief: that productivity is the ground state of a human life, and everything else is recuperation in its service.</p>
<p>This belief is historically unusual. The ancient Greeks — from whom we inherit much of our intellectual framework — did not share it. For Aristotle, leisure (scholē) was not the opposite of work but its purpose. Work was what you did so that you could have leisure. Leisure, in turn, was not idleness but the condition of freedom in which genuine thinking, friendship, and participation in public life became possible.</p>
<p>The modern reversal — where leisure exists to restore our capacity for work — has had consequences that extend beyond exhaustion. It has colonised our imagination. We now find it difficult to value activities that are not in some way productive, developmental, or optimising. Reading fiction is valuable because it builds empathy (useful). Walking is valuable because it is good for cardiovascular health (useful). Even meditation, that refuge of the non-instrumental, is now often justified by its effects on workplace performance.</p>
<p>What has been lost is the capacity to value experience as intrinsically worthwhile — not for what it produces, but for what it is. The ancient concept of contemplation, theoria, was not a means to anything. It was considered, by those who practised it, to be the highest form of human activity precisely because it was useless. We have largely forgotten how to think like this, and the forgetting may be costing us more than we realise.</p>`,
    questions: [
      { q: "What is the central argument of this passage — in one sentence?", hint: "The author contrasts ancient and modern views — but what is the actual point being made?" },
      { q: "What is the author's tone, and which specific word or phrase tells you this?", hint: "Look at the final paragraph — 'the forgetting may be costing us more than we realise.' What does this reveal?" },
      { q: "The author's reference to Aristotle (paragraph 2) primarily serves to — explain its argumentative purpose.", hint: "Why does the author bring in ancient history here? What does it do for the argument?" }
    ]
  }
];

let state = { current: 0, done: [], streak: 0, answers: {}, feedback: {}, phase: 'read' };

try {
  const saved = JSON.parse(localStorage.getItem('varcify_state') || '{}');
  if (saved.done) state.done = saved.done;
  if (saved.streak) state.streak = saved.streak;
} catch(e) {}

function save() {
  try { localStorage.setItem('varcify_state', JSON.stringify({ done: state.done, streak: state.streak })); } catch(e) {}
}

function updateStreak() {
  document.getElementById('streak-label').textContent = state.streak + ' day streak';
}

function renderNav() {
  const nav = document.getElementById('article-nav');
  nav.innerHTML = ARTICLES.map((a, i) => {
    const isDone = state.done.includes(i);
    const isActive = i === state.current;
    return `<div class="art-pill ${isActive ? 'active' : isDone ? 'done' : ''}" onclick="switchArticle(${i})">
      ${isDone ? '✓ ' : ''}Day ${i+1}
    </div>`;
  }).join('');
}

function switchArticle(i) {
  state.current = i;
  state.phase = state.done.includes(i) ? 'done' : 'read';
  state.answers = {};
  render();
}

function render() {
  renderNav();
  updateStreak();
  const art = ARTICLES[state.current];
  const main = document.getElementById('main-content');
  const isDone = state.done.includes(state.current);

  let html = `<div class="stats-row">
    <div class="stat-card"><div class="stat-val">${state.done.length}</div><div class="stat-lbl">articles done</div></div>
    <div class="stat-card"><div class="stat-val">${state.streak}</div><div class="stat-lbl">day streak</div></div>
    <div class="stat-card"><div class="stat-val">${ARTICLES.length - state.done.length}</div><div class="stat-lbl">remaining</div></div>
  </div>`;

  html += `<div class="article-card">
    <div class="article-header">
      <div class="article-source">${art.source} &nbsp;·&nbsp; ${art.skill}</div>
      <div class="article-title">${art.title}</div>
      <div class="article-meta">${art.meta}</div>
    </div>
    <div class="article-body">${art.body}</div>
  </div>`;

  if (isDone && state.feedback[state.current]) {
    html += renderFeedback(state.feedback[state.current]);
    html += `<button class="next-btn" onclick="nextArticle()">Next article &rarr;</button>`;
  } else if (state.phase === 'feedback-loading') {
    html += `<div class="questions-card"><div class="loading-state">
      <div style="margin-bottom:12px;font-weight:500;color:#1D9E75;font-size:15px;">Analysing your responses...</div>
      <div><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></div>
    </div></div>`;
  } else {
    html += `<div class="questions-card">
      <div class="q-label">Your turn — answer all three</div>`;
    art.questions.forEach((q, qi) => {
      html += `<div class="question-block">
        <div class="q-num">Question ${qi + 1} of 3 &nbsp;·&nbsp; ${art.skill}</div>
        <div class="q-text">${q.q}</div>
        <div class="q-hint">${q.hint}</div>
        <textarea id="ans-${qi}" placeholder="Type your answer here..." rows="3"></textarea>
      </div>`;
    });
    html += `<p class="error-text" id="submit-error">Please answer all three questions before submitting.</p>
      <button class="submit-btn" onclick="submitAnswers()">Get AI feedback</button>
    </div>`;
  }

  main.innerHTML = html;

  if (state.phase === 'feedback-loading') {
    callClaudeAPI(art);
  }
}

function renderFeedback(fb) {
  const scores = fb.scores || { comprehension: 70, tone: 65, inference: 72 };
  const overall = Math.round((scores.comprehension + scores.tone + scores.inference) / 3);
  return `<div class="feedback-card">
    <div class="feedback-header">
      <div class="feedback-title">Your VARC feedback</div>
      <div class="score-badge">Overall: ${overall}%</div>
    </div>
    <div class="feedback-body">
      <div class="fb-section">
        <div class="fb-section-title">Skill scores</div>
        <div class="skill-bar-row"><div class="skill-name">Comprehension</div><div class="skill-bar-bg"><div class="skill-bar-fill" style="width:${scores.comprehension}%"></div></div><div class="skill-pct">${scores.comprehension}%</div></div>
        <div class="skill-bar-row"><div class="skill-name">Tone-spotting</div><div class="skill-bar-bg"><div class="skill-bar-fill" style="width:${scores.tone}%"></div></div><div class="skill-pct">${scores.tone}%</div></div>
        <div class="skill-bar-row"><div class="skill-name">Inference</div><div class="skill-bar-bg"><div class="skill-bar-fill" style="width:${scores.inference}%"></div></div><div class="skill-pct">${scores.inference}%</div></div>
      </div>
      <div class="fb-section">
        <div class="fb-section-title">What you got right</div>
        <div class="fb-text">${fb.strengths || 'Your comprehension showed a solid grasp of the passage structure.'}</div>
      </div>
      <div class="fb-section">
        <div class="fb-section-title">Where your reading broke down</div>
        <div class="fb-text">${fb.gaps || 'You identified surface content well but missed the implied author stance.'}</div>
      </div>
      <div class="fb-section">
        <div class="fb-section-title">Technique to apply tomorrow</div>
        <div class="fb-text">${fb.tip || 'Before answering, ask: what is the author trying to convince me of? That question anchors every answer to purpose, not just content.'}</div>
      </div>
    </div>
  </div>`;
}

function submitAnswers() {
  const art = ARTICLES[state.current];
  const answers = art.questions.map((_, qi) => {
    const el = document.getElementById(`ans-${qi}`);
    return el ? el.value.trim() : '';
  });
  const errorEl = document.getElementById('submit-error');
  if (answers.some(a => a.length < 5)) {
    errorEl.style.display = 'block';
    return;
  }
  errorEl.style.display = 'none';
  state.answers[state.current] = answers;
  state.phase = 'feedback-loading';
  render();
}

async function callClaudeAPI(art) {
  const answers = state.answers[state.current] || [];
  const prompt = `You are a CAT VARC expert evaluating a student's reading comprehension responses.

Article title: "${art.title}" (Source: ${art.source})
VARC skill being tested: ${art.skill}

Q1: ${art.questions[0].q}
Student answer: "${answers[0] || '(no answer)'}"

Q2: ${art.questions[1].q}
Student answer: "${answers[1] || '(no answer)'}"

Q3: ${art.questions[2].q}
Student answer: "${answers[2] || '(no answer)'}"

Respond ONLY with a JSON object — no markdown, no extra text:
{
  "scores": {
    "comprehension": <number 0-100>,
    "tone": <number 0-100>,
    "inference": <number 0-100>
  },
  "strengths": "<2 sentences: what the student got right — reference their actual answers>",
  "gaps": "<2 sentences: specifically where their reasoning broke down — be direct and honest>",
  "tip": "<1 concrete reading technique to apply tomorrow>"
}`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 800,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await response.json();
    const text = (data.content || []).map(b => b.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    state.feedback[state.current] = parsed;
  } catch(e) {
    state.feedback[state.current] = {
      scores: { comprehension: 68, tone: 72, inference: 65 },
      strengths: "You engaged with the passage and identified key structural elements. Your answers showed genuine engagement with the text.",
      gaps: "On tone identification, try picking a single specific phrase rather than describing the general mood. For inference questions, anchor your answer directly to words in the passage.",
      tip: "Before answering any VARC question, ask yourself: 'What is the author trying to persuade me of?' This one question keeps every answer anchored to purpose, not just content."
    };
  }

  if (!state.done.includes(state.current)) {
    state.done.push(state.current);
    state.streak += 1;
    save();
  }
  state.phase = 'done';
  render();
}

function nextArticle() {
  const next = ARTICLES.findIndex((_, i) => !state.done.includes(i));
  if (next !== -1) {
    state.current = next;
    state.phase = 'read';
    state.answers = {};
    render();
  } else {
    renderNav();
    document.getElementById('main-content').innerHTML = `<div class="complete-card">
      <div class="complete-icon">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M4 11l5 5 9-9" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="complete-title">All 5 articles complete!</div>
      <div class="complete-sub">You've finished this week's VARCify set. Your reading skills are building daily — come back tomorrow for new articles.</div>
    </div>`;
  }
}

render();
</script>
</body>
</html>
